<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HEADLOCK MAX</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #0b0f1a, #000);
  font-family: 'Segoe UI', sans-serif;
  color:white;
  overflow:hidden;
}

/* PARTICLE */
canvas {
  position:fixed;
  z-index:-1;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
}

.title {
  font-size:28px;
  color:#00f0ff;
  text-shadow:0 0 15px #00f0ff;
}

.status {
  font-size:12px;
  color:#00ff99;
}

/* CARD */
.card {
  background: rgba(17,24,39,0.8);
  margin:10px;
  padding:15px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow:0 0 20px rgba(0,240,255,0.3);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.02);
}

/* TOGGLE */
.toggle {
  width:50px;
  height:25px;
  border-radius:20px;
  background:#333;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.toggle.active {
  background:#FFC857;
  box-shadow:0 0 10px #FFC857;
}

.circle {
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:0.3s;
}

.toggle.active .circle {
  left:26px;
}

/* BUTTON */
.btn {
  padding:10px;
  border-radius:20px;
  border:1px solid #00f0ff;
  text-align:center;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  box-shadow:0 0 10px #00f0ff;
}

/* SCRIPT BOX */
.script {
  background:#111827;
  margin:10px;
  padding:15px;
  border-radius:20px;
  font-family:monospace;
  color:#00f0ff;
  box-shadow:0 0 15px #00f0ff;
}

/* LOGIN */
.login {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:#111827;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 20px #00f0ff;
}

input {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:10px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h2>ENTER KEY</h2>
    <input id="key" placeholder="Nhập key...">
    <br>
    <button onclick="enter()">XÁC NHẬN</button>
  </div>
</div>

<!-- MAIN -->
<div id="app" style="display:none">

<div class="header">
  <div class="title">HEADLOCK</div>
  <div class="status">ACTIVE: 6/6 | FPS: 60</div>
</div>

<div class="card">
  <b>TÂM ẢO</b><br>
  Hiển thị tâm ngắm
</div>

<div style="display:flex">
  <div class="btn">Free Fire</div>
  <div class="btn">Free Fire Max</div>
</div>

<div id="features"></div>

<div class="script">
boot: 1293ms<br>
pipeline: neon_green<br>
status: tracking<br>
verify: OK
</div>

</div>

<script>
// ===== KEY =====
let validKeys = ["FF-XM-4217","FF-TH-916","Admin1608qb"];

function enter(){
  let k = document.getElementById("key").value;

  if(validKeys.includes(k)){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  } else {
    alert("Key sai!");
  }
}

// ===== FEATURES =====
let features = [
  "AIMLOCK","EXACTLY++","OPTIMIZE",
  "SENSITIVITY PRO","LEGIT PRO","AIMLOCK HEAD"
];

function render(){
  let html = "";

  features.forEach(f=>{
    html += `
    <div class="card" style="display:flex;justify-content:space-between">
      <span>${f}</span>
      <div class="toggle active" onclick="this.classList.toggle('active')">
        <div class="circle"></div>
      </div>
    </div>
    `;
  });

  document.getElementById("features").innerHTML = html;
}

// ===== PARTICLE =====
let c = document.getElementById("bg");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let p = [];

for(let i=0;i<80;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  p.forEach(dot=>{
    dot.y += 0.5;
    if(dot.y > c.height) dot.y = 0;

    ctx.fillStyle="#00f0ff";
    ctx.fillRect(dot.x,dot.y,2,2);
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
