<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEADLOCK MOBILE</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:sans-serif;
}

/* CENTER */
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* BUTTON */
.btn{
  width:90%;
  padding:15px;
  margin:10px;
  border-radius:20px;
  text-align:center;
  border:1px solid #00f0ff;
  box-shadow:0 0 10px #00f0ff;
}

/* LOADING */
.progress{
  width:80%;
  height:20px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#00f0ff;
  box-shadow:0 0 10px #00f0ff;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:15px;
  border-radius:20px;
  box-shadow:0 0 10px #00f0ff;
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>ENTER KEY</h2>
  <input id="key" placeholder="Nhập key...">
  <button onclick="login()">XÁC NHẬN</button>
</div>

<!-- MAIN -->
<div id="main" class="center" style="display:none">

  <h2 style="color:#00f0ff">HEADLOCK</h2>

  <div class="btn" onclick="runGame()">🎮 Free Fire</div>
  <div class="btn" onclick="runGame()">🔥 Free Fire MAX</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p id="percent">0%</p>

</div>

<div id="toast" class="toast"></div>

<script>
// KEY
let keys = ["FF-XM-4217","FF-TH-916","Admin1608qb"];

function login(){
  let k = document.getElementById("key").value;
  if(keys.includes(k)){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="flex";
    show("KEY ACTIVE ✔");
  } else {
    alert("Sai key!");
  }
}

// TOAST
function show(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

// RUN GAME
function runGame(){
  let bar = document.getElementById("bar");
  let text = document.getElementById("percent");

  let i = 0;
  let interval = setInterval(()=>{
    i++;
    bar.style.width = i+"%";
    text.innerText = i+"%";

    if(i==30) show("Đang tối ưu hệ thống...");
    if(i==60) show("Đang kích hoạt cấu hình...");
    if(i==90) show("Gần hoàn tất...");

    if(i>=100){
      clearInterval(interval);
      show("✔ BẬT CHỨC NĂNG THÀNH CÔNG");
      setTimeout(()=>{
        show("👉 Vui lòng vào game Free Fire");
      },1500);
    }
  },30);
}
</script>

</body>
</html>
